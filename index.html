<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="carlwang.cn 正在开发中，惊喜在后面。"
    />
    <title>carlwang.cn</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f5f7;
        --fg: #1d1d1f;
        --muted: #6e6e73;
        --line: rgba(29, 29, 31, 0.14);
        --accent: #0071e3;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg);
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "SF Pro Display", "SF Pro Text", -apple-system,
          BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", sans-serif;
        color: var(--fg);
        background:
          radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.9), transparent 34rem),
          linear-gradient(180deg, #fbfbfd 0%, var(--bg) 72%);
        -webkit-font-smoothing: antialiased;
        text-rendering: geometricPrecision;
      }

      .page {
        position: relative;
        display: grid;
        min-height: 100vh;
        grid-template-rows: 1fr auto;
        padding: 32px clamp(20px, 5vw, 64px);
      }

      main {
        display: grid;
        place-items: center;
        text-align: center;
      }

      .content {
        width: min(100%, 760px);
      }

      .brand {
        margin: 0 0 22px;
        font-size: clamp(17px, 2vw, 21px);
        font-weight: 500;
        letter-spacing: 0;
        color: var(--muted);
      }

      h1 {
        margin: 0;
        font-size: clamp(42px, 7vw, 88px);
        font-weight: 700;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 22px auto 0;
        max-width: 560px;
        font-size: clamp(19px, 2.6vw, 28px);
        font-weight: 500;
        line-height: 1.42;
        color: var(--muted);
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 34px;
        padding: 10px 16px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.66);
        color: var(--fg);
        font-size: 15px;
        font-weight: 500;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 6px rgba(0, 113, 227, 0.12);
      }

      footer {
        padding-top: 28px;
        text-align: center;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      @media (max-width: 560px) {
        .page {
          padding: 24px 20px;
        }

        .status {
          width: 100%;
          justify-content: center;
          border-radius: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <main aria-labelledby="page-title">
        <section class="content">
          <p class="brand">carlwang.cn</p>
          <h1 id="page-title">正在开发中</h1>
          <p class="subtitle">惊喜在后面。</p>
          <div class="status" aria-label="网站状态">
            <span class="dot" aria-hidden="true"></span>
            <span>Building something new</span>
          </div>
        </section>
      </main>
      <footer>© carlwang. All rights reserved.</footer>
    </div>
  </body>
</html>
